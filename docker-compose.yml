version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: rag_backend
    ports:
      - "8000:8000"
    volumes:
      - ./vectorstore:/app/vectorstore
      - ./data:/app/data
    depends_on:
      - redis

  ui:
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
    container_name: rag_ui
    ports:
      - "8001:8001"
    depends_on:
      - backend

  redis:
    image: redis:7
    container_name: rag_redis
    ports:
      - "6379:6379"